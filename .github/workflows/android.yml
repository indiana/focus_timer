name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Gradle
      env:
        ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
        ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
      run: ./gradlew assembleDebug

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/release.jks

    - name: Build Release Bundle
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
        ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
      run: ./gradlew bundleRelease --stacktrace > gradle_build.log 2>&1 || { tail -n 100 gradle_build.log; exit 1; }

    - name: Push logs on failure
      if: failure()
      run: |
        git config --global user.name "Github Actions"
        git config --global user.email "actions@github.com"
        git checkout -b debug-logs
        git add gradle_build.log
        git commit -m "ci: save build failure logs [skip ci]"
        git push origin debug-logs --force

    - name: Upload Release Bundle
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
